<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FindYourVibe - คุยกับพี่แนะแนว</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .glass-header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }
        .dark .glass-header {
            background: rgba(15, 23, 42, 0.85);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-[url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop')] bg-cover bg-center text-slate-800 dark:text-slate-100 min-h-[100dvh] h-[100dvh] flex flex-col items-center justify-center p-0 md:p-6 relative overflow-hidden transition-colors duration-300">
    <!-- Overlay -->
    <div class="absolute inset-0 bg-slate-900/10 dark:bg-slate-950/40 backdrop-blur-sm"></div>

    <div class="w-full max-w-lg h-full md:h-[90vh] bg-white/95 dark:bg-slate-900/95 backdrop-blur-md md:rounded-[2rem] shadow-2xl flex flex-col overflow-hidden relative z-10 border border-white/50 dark:border-slate-800/50">
        <!-- Header -->
        <div class="glass-header p-5 z-10 flex items-center gap-4">
            <div class="w-12 h-12 bg-gradient-to-tr from-indigo-500 to-purple-500 rounded-full flex items-center justify-center shrink-0 shadow-lg shadow-indigo-200 dark:shadow-none text-white text-xl">
                👩‍🏫
            </div>
            <div class="flex-1 min-w-0">
                <h1 class="font-semibold text-slate-800 dark:text-slate-200 text-lg leading-tight truncate">พี่แนะแนวใจดี</h1>
                <div class="flex items-center gap-1.5 mt-0.5">
                    <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                    <p id="vibe-status" class="text-indigo-600 dark:text-indigo-400 text-xs font-medium truncate">กำลังคุยกับ...</p>
                </div>
            </div>
            <!-- Dark Mode Toggle Button (Sliding Sky Switch) -->
            <button onclick="toggleTheme()" class="relative w-[76px] h-[36px] rounded-full p-1 transition-all duration-500 focus:outline-none overflow-hidden bg-gradient-to-r from-sky-300 to-blue-400 dark:from-slate-900 dark:to-indigo-950 border border-slate-300/30 dark:border-slate-800 shadow-inner flex items-center shrink-0 hover:scale-105 active:scale-95 group">
                <!-- Concentric circles/waves (Light Mode) -->
                <div class="absolute -left-2 top-1/2 -translate-y-1/2 w-20 h-20 rounded-full bg-white/10 dark:opacity-0 transition-opacity duration-500 pointer-events-none scale-100"></div>
                <div class="absolute -left-6 top-1/2 -translate-y-1/2 w-28 h-28 rounded-full bg-white/5 dark:opacity-0 transition-opacity duration-500 pointer-events-none scale-100"></div>
                
                <!-- Concentric circles/waves (Dark Mode) -->
                <div class="absolute -right-2 top-1/2 -translate-y-1/2 w-20 h-20 rounded-full bg-indigo-500/10 opacity-0 dark:opacity-100 transition-opacity duration-500 pointer-events-none scale-100"></div>
                <div class="absolute -right-6 top-1/2 -translate-y-1/2 w-28 h-28 rounded-full bg-indigo-500/5 opacity-0 dark:opacity-100 transition-opacity duration-500 pointer-events-none scale-100"></div>

                <!-- Starry background (only visible in dark mode) -->
                <div class="absolute inset-0 opacity-0 dark:opacity-100 transition-opacity duration-500 pointer-events-none">
                    <span class="absolute text-[6px] text-white top-1 left-3 animate-pulse">★</span>
                    <span class="absolute text-[4px] text-white top-5 left-6">✦</span>
                    <span class="absolute text-[5px] text-white top-2.5 left-10 animate-pulse">★</span>
                    <span class="absolute text-[4px] text-white top-6.5 left-4">✦</span>
                </div>
                
                <!-- Cloud background (only visible in light mode) -->
                <div class="absolute inset-x-0 bottom-0 h-4 opacity-100 dark:opacity-0 transition-opacity duration-500 pointer-events-none flex items-end justify-center">
                    <svg class="w-14 h-3.5 text-white/50" viewBox="0 0 100 30" fill="currentColor">
                        <path d="M 0 30 L 100 30 L 100 15 C 90 15, 85 10, 75 12 C 65 10, 55 5, 45 10 C 35 8, 25 15, 15 15 C 5 15, 0 20, 0 30 Z"></path>
                    </svg>
                </div>

                <!-- Knob (Sun / Moon) -->
                <div class="w-7 h-7 rounded-full transform transition-transform duration-500 flex items-center justify-center relative z-10 translate-x-0 dark:translate-x-10 bg-amber-400 dark:bg-slate-200 shadow-md">
                    <!-- Sun Details -->
                    <div class="absolute inset-0 rounded-full bg-amber-400 dark:opacity-0 transition-opacity duration-500 shadow-[0_0_10px_#f59e0b]">
                        <div class="absolute inset-1 rounded-full bg-amber-300"></div>
                    </div>
                    <!-- Moon Details -->
                    <div class="absolute inset-0 rounded-full bg-slate-200 dark:opacity-100 opacity-0 transition-opacity duration-500 flex items-center justify-center overflow-hidden">
                        <div class="w-0.5 h-0.5 bg-slate-300 rounded-full absolute top-1 left-1.5"></div>
                        <div class="w-1 h-1 bg-slate-300 rounded-full absolute bottom-1 right-2"></div>
                        <div class="w-0.5 h-0.5 bg-slate-300 rounded-full absolute top-2 right-1.5"></div>
                        <div class="absolute inset-0 bg-gradient-to-tr from-transparent via-transparent to-black/10 rounded-full"></div>
                    </div>
                </div>
            </button>
            <!-- Dropdown Menu -->
            <div class="relative shrink-0">
                <button onclick="toggleMenu()" id="menu-btn" class="text-slate-400 hover:text-indigo-600 transition-colors p-2 rounded-full hover:bg-indigo-50 shrink-0 focus:outline-none">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z"></path>
                    </svg>
                </button>
                <!-- Dropdown items -->
                <div id="dropdown-menu" class="hidden absolute right-0 mt-2 w-48 bg-white/95 dark:bg-slate-900/95 backdrop-blur-md border border-slate-100 dark:border-slate-800 rounded-2xl shadow-xl z-50 py-2 transform origin-top-right transition-all">
                    <a href="https://docs.google.com/forms/d/e/1FAIpQLSdTPRJLoiAcuaV5b6lwrlsuFC8xCp5IU_6Z4CwQKAC0bNsKMA/viewform?usp=publish-editor" target="_blank" rel="noopener noreferrer" class="flex items-center gap-2 px-4 py-2.5 text-sm text-slate-700 dark:text-slate-300 hover:bg-rose-50 dark:hover:bg-rose-950/30 hover:text-rose-600 dark:hover:text-rose-400 transition-colors">
                        <svg class="w-4 h-4 text-rose-500 dark:text-rose-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                        </svg>
                        รายงานปัญหา
                    </a>
                    <a href="https://docs.google.com/forms/d/e/1FAIpQLSdPoL6Ui7YZ0m9kx8Q1LcCkMj-sQTNsjw7Ba31RBOx_NOfjSw/viewform?usp=publish-editor" target="_blank" rel="noopener noreferrer" class="flex items-center gap-2 px-4 py-2.5 text-sm text-slate-700 dark:text-slate-300 hover:bg-indigo-50 dark:hover:bg-indigo-950/30 hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors">
                        <svg class="w-4 h-4 text-indigo-500 dark:text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
                        </svg>
                        ส่ง Feedback
                    </a>
                </div>
            </div>
            <button onclick="window.location.href='index.html'" class="text-slate-400 hover:text-indigo-600 transition-colors p-2 rounded-full hover:bg-indigo-50 shrink-0">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>

        <!-- Chat Area -->
        <div id="chat-box" class="flex-1 overflow-y-auto p-5 space-y-6 bg-slate-50/50 dark:bg-slate-950/40 flex flex-col relative scroll-smooth">
            <!-- Messages will be injected here -->
        </div>

        <!-- Input Area -->
        <div class="bg-white/90 dark:bg-slate-900/90 backdrop-blur-md p-4 border-t border-slate-100 dark:border-slate-800">
            <form id="chat-form" class="flex gap-3 items-end">
                <div class="flex-1 bg-slate-100 dark:bg-slate-950 rounded-3xl relative border border-slate-200/50 dark:border-slate-800 shadow-inner">
                    <input type="text" id="message-input" class="w-full bg-transparent text-slate-800 dark:text-slate-200 px-5 py-3.5 focus:outline-none focus:ring-0 placeholder-slate-400 dark:placeholder-slate-500" placeholder="พิมพ์ข้อความที่นี่..." autocomplete="off">
                </div>
                <button type="submit" id="send-btn" class="bg-gradient-to-r from-indigo-600 to-purple-600 text-white w-14 h-14 rounded-full flex items-center justify-center hover:from-indigo-700 hover:to-purple-700 transition-all shrink-0 disabled:opacity-50 disabled:cursor-not-allowed active:scale-95 shadow-lg shadow-indigo-200 dark:shadow-none">
                    <svg class="w-6 h-6 ml-1" fill="currentColor" viewBox="0 0 20 20"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"></path></svg>
                </button>
            </form>
        </div>
    </div>

    <script>
        const userVibe = sessionStorage.getItem('user_vibe');
        if (!userVibe) {
            window.location.href = 'index.html';
        }

        document.getElementById('vibe-status').textContent = `สไตล์: ${userVibe}`;
        
        const chatBox = document.getElementById('chat-box');
        const chatForm = document.getElementById('chat-form');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');

        setTimeout(() => {
            addMessage(`สวัสดีจ้า พี่แนะแนวยินดีต้อนรับนะ! พี่เห็นว่าเราเป็น <strong>${userVibe}</strong> มีเรื่องอะไรเกี่ยวกับการเรียนต่อ ค้นหาคณะ หรือการเตรียมตัวสอบที่อยากให้พี่ช่วยแนะนำไหมจ๊ะ? 😊`, 'ai');
        }, 600);

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = messageInput.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            messageInput.value = '';
            
            const typingId = addTypingIndicator();
            sendBtn.disabled = true;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, user_vibe: userVibe })
                });

                const data = await response.json();
                removeTypingIndicator(typingId);
                
                if (response.ok) {
                    addMessage(data.reply, 'ai');
                } else {
                    addMessage(`ขออภัยจ้า ระบบมีปัญหาขัดข้อง: ${data.error || 'Unknown error'}`, 'system');
                }
            } catch (error) {
                removeTypingIndicator(typingId);
                addMessage(`ขออภัยจ้า ไม่สามารถเชื่อมต่อได้ ลองใหม่อีกครั้งนะ`, 'system');
            } finally {
                sendBtn.disabled = false;
                messageInput.focus();
            }
        });

        function addMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `flex ${sender === 'user' ? 'justify-end' : 'justify-start'} w-full transform transition-all duration-300 translate-y-4 opacity-0`;
            
            const bubble = document.createElement('div');
            if (sender === 'user') {
                bubble.className = "bg-gradient-to-r from-indigo-600 to-purple-600 dark:from-indigo-500 dark:to-purple-500 text-white px-5 py-3 rounded-2xl rounded-br-sm max-w-[85%] shadow-md shadow-indigo-100 dark:shadow-none text-[15px] break-words";
                bubble.textContent = text;
            } else if (sender === 'ai') {
                bubble.className = "bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-200 px-5 py-3 rounded-2xl rounded-tl-sm max-w-[85%] shadow-md shadow-slate-200/50 dark:shadow-none text-[15px] border border-slate-100 dark:border-slate-700/60 break-words leading-relaxed";
                bubble.innerHTML = text.replace(/\n/g, '<br>');
            } else {
                bubble.className = "bg-red-50 dark:bg-red-950/20 text-red-500 dark:text-red-400 px-5 py-3 rounded-2xl max-w-[85%] text-sm text-center mx-auto border border-red-100 dark:border-red-900/30";
                bubble.textContent = text;
            }

            msgDiv.appendChild(bubble);
            chatBox.appendChild(msgDiv);
            
            requestAnimationFrame(() => {
                msgDiv.classList.remove('translate-y-4', 'opacity-0');
            });
            
            scrollToBottom();
        }

        function addTypingIndicator() {
            const id = 'typing-' + Date.now();
            const msgDiv = document.createElement('div');
            msgDiv.id = id;
            msgDiv.className = `flex justify-start w-full transform transition-all duration-300 translate-y-4 opacity-0`;
            
            const bubble = document.createElement('div');
            bubble.className = "bg-white dark:bg-slate-800 px-5 py-4 rounded-2xl rounded-tl-sm shadow-md shadow-slate-200/50 dark:shadow-none border border-slate-100 dark:border-slate-700/60 flex gap-2 items-center";
            bubble.innerHTML = `
                <div class="w-2 h-2 bg-indigo-400 rounded-full animate-bounce"></div>
                <div class="w-2 h-2 bg-indigo-400 rounded-full animate-bounce" style="animation-delay: 0.15s"></div>
                <div class="w-2 h-2 bg-indigo-400 rounded-full animate-bounce" style="animation-delay: 0.3s"></div>
            `;
            
            msgDiv.appendChild(bubble);
            chatBox.appendChild(msgDiv);
            
            requestAnimationFrame(() => {
                msgDiv.classList.remove('translate-y-4', 'opacity-0');
            });
            
            scrollToBottom();
            return id;
        }

        function removeTypingIndicator(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        function scrollToBottom() {
            chatBox.scrollTo({
                top: chatBox.scrollHeight,
                behavior: 'smooth'
            });
        }

        function toggleMenu() {
            const menu = document.getElementById('dropdown-menu');
            menu.classList.toggle('hidden');
        }

        // Close dropdown when clicking outside
        window.addEventListener('click', (e) => {
            const menu = document.getElementById('dropdown-menu');
            const menuBtn = document.getElementById('menu-btn');
            if (menu && !menu.classList.contains('hidden') && !menuBtn.contains(e.target) && !menu.contains(e.target)) {
                menu.classList.add('hidden');
            }
        });

        function toggleTheme() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.theme = 'light';
            } else {
                document.documentElement.classList.add('dark');
                localStorage.theme = 'dark';
            }
        }
    </script>

    <!-- Floating Action Buttons (Desktop only to prevent overlapping on mobile) -->
    <div class="hidden md:flex fixed bottom-6 right-6 flex-col gap-3 z-50 items-end text-base">
        <!-- Report Issue Button -->
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSdTPRJLoiAcuaV5b6lwrlsuFC8xCp5IU_6Z4CwQKAC0bNsKMA/viewform?usp=publish-editor" target="_blank" rel="noopener noreferrer" class="bg-white/90 backdrop-blur-md text-rose-500 px-4 py-3 rounded-full shadow-lg shadow-rose-100/50 border border-rose-100 hover:bg-rose-50 hover:-translate-y-1 transition-all duration-300 font-medium flex items-center gap-2 group">
            <svg class="w-5 h-5 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
            รายงานปัญหา
        </a>
        <!-- Feedback Button -->
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSdPoL6Ui7YZ0m9kx8Q1LcCkMj-sQTNsjw7Ba31RBOx_NOfjSw/viewform?usp=publish-editor" target="_blank" rel="noopener noreferrer" class="bg-white/90 backdrop-blur-md text-indigo-600 px-4 py-3 rounded-full shadow-lg shadow-indigo-100/50 border border-indigo-100 hover:bg-indigo-50 hover:-translate-y-1 transition-all duration-300 font-medium flex items-center gap-2 group">
            <svg class="w-5 h-5 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
            ส่ง Feedback
        </a>
    </div>
</body>
</html>
