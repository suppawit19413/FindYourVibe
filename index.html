<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FindYourVibe - ค้นหาตัวเอง</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .dark .glass-panel {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob { animation: blob 7s infinite; }
        .animation-delay-2000 { animation-delay: 2s; }
        .animation-delay-4000 { animation-delay: 4s; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
            opacity: 0;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-[100dvh] flex flex-col items-center justify-center p-4 sm:p-6 relative overflow-x-hidden overflow-y-auto transition-colors duration-300 dark:bg-slate-950 dark:text-slate-100">

    <div class="absolute top-0 -right-4 w-72 h-72 bg-indigo-300 rounded-full mix-blend-multiply filter blur-2xl opacity-50 dark:opacity-30 animate-blob animation-delay-2000"></div>
    <div class="absolute -bottom-8 left-20 w-72 h-72 bg-pink-300 rounded-full mix-blend-multiply filter blur-2xl opacity-50 dark:opacity-30 animate-blob animation-delay-4000"></div>

    <!-- Dark Mode Toggle Button (Sliding Sky Switch) -->

            <!-- Starry background (only visible in dark mode) -->
            <div class="absolute inset-0 opacity-0 dark:opacity-100 transition-opacity duration-500 pointer-events-none">
                <span class="absolute text-[6px] text-white top-1 left-2 animate-pulse">★</span>
                <span class="absolute text-[4px] text-white top-4 left-5">✦</span>
                <span class="absolute text-[5px] text-white top-2 left-7 animate-pulse">★</span>
                <span class="absolute text-[4px] text-white top-5 left-3">✦</span>

            <div class="absolute inset-x-0 bottom-0 h-4 opacity-100 dark:opacity-0 transition-opacity duration-500 pointer-events-none flex items-end justify-center">

                    <path d="M 0 30 L 100 30 L 100 15 C 90 15, 85 10, 75 12 C 65 10, 55 5, 45 10 C 35 8, 25 15, 15 15 C 5 15, 0 20, 0 30 Z"></path>
                </svg>
            </div>

                <div class="absolute inset-0 rounded-full bg-amber-400 dark:opacity-0 transition-opacity duration-500 shadow-[0_0_8px_#f59e0b]"></div>
                <!-- Moon Details (only in dark mode) -->

                    <div class="w-1.5 h-1.5 bg-slate-300 rounded-full absolute bottom-1 right-2"></div>

    </div>

            <div class="space-y-4">

            </button>
        </div>
    </div>

                        { text: "พลังอ่านใจคนออก และพูดโน้มน้าวใครก็คล้อยตาม", type: "สายสังคมและการสื่อสาร (Social & Communication)" },
                        { text: "พลังเสกสิ่งที่คิดในหัว ให้ออกมาเป็นรูปร่างที่จับต้องได้จริง", type: "สายศิลปะและความคิดสร้างสรรค์ (Art & Design)" },
                        { text: "พลังควบคุมและเชื่อมต่อกับเครื่องจักรหรืออุปกรณ์อิเล็กทรอนิกส์ได้ทุกชนิด", type: "สายเทคโนโลยีและปฏิบัติการ (Tech & Hands-on)" },
                        { text: "พลังหยุดเวลาชั่วคราว เพื่อให้มีเวลาคิดวิเคราะห์สถานการณ์ได้อย่างรอบคอบ", type: "สายข้อมูลและการวิเคราะห์ (Data & Analysis)" }
                    ]
                }
            ]
        };

        let currentQuestions = [];
        let currentQuestionIndex = 0;
        let scores = {};

        function startQuiz(mode) {
            currentQuestions = quizData[mode];
            currentQuestionIndex = 0;
            scores = {
                "สายสังคมและการสื่อสาร (Social & Communication)": 0,
                "สายศิลปะและความคิดสร้างสรรค์ (Art & Design)": 0,
                "สายเทคโนโลยีและปฏิบัติการ (Tech & Hands-on)": 0,
                "สายข้อมูลและการวิเคราะห์ (Data & Analysis)": 0
            };
            
            document.getElementById('welcome-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            const q = currentQuestions[currentQuestionIndex];
            document.getElementById('question-text').textContent = q.text;
            document.getElementById('question-counter').textContent = `ข้อ ${currentQuestionIndex + 1} / ${currentQuestions.length}`;
            document.getElementById('progress-bar').style.width = `${((currentQuestionIndex + 1) / currentQuestions.length) * 100}%`;
            
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            
            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-3.5 sm:p-4 rounded-2xl bg-white/60 dark:bg-slate-900/40 border border-white dark:border-slate-800 hover:border-indigo-300 dark:hover:border-indigo-500 hover:bg-white dark:hover:bg-slate-900 text-slate-700 dark:text-slate-300 hover:text-indigo-700 dark:hover:text-indigo-400 transition-all duration-300 shadow-sm hover:shadow-md focus:outline-none focus:ring-4 focus:ring-indigo-100 dark:focus:ring-indigo-950 animate-fade-in text-[13px] sm:text-[14px] md:text-[15px]";
                btn.style.animationDelay = `${index * 100}ms`;
                btn.innerHTML = `<span class="block">${opt.text}</span>`;
                btn.onclick = () => selectOption(opt.type);
                optionsContainer.appendChild(btn);
            });
        }

        function selectOption(type) {
            scores[type]++;
            currentQuestionIndex++;
            
            if (currentQuestionIndex < currentQuestions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            
            let maxScore = -1;
            let finalVibe = "";
            for (const [vibe, score] of Object.entries(scores)) {
                if (score > maxScore) {
                    maxScore = score;
                    finalVibe = vibe;
                }
            }
            
            document.getElementById('vibe-result').textContent = finalVibe;
            sessionStorage.setItem('user_vibe', finalVibe);
        }

        function goToChat() {
            window.location.href = 'chat.html';
        }

        function toggleTheme() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.theme = 'light';
            } else {
                document.documentElement.classList.add('dark');
                localStorage.theme = 'dark';
            }
        }
    </script>
