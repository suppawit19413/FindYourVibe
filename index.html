<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FindYourVibe - ค้นหาตัวเอง</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob { animation: blob 7s infinite; }
        .animation-delay-2000 { animation-delay: 2s; }
        .animation-delay-4000 { animation-delay: 4s; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
            opacity: 0;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
    <!-- Animated Background Blobs -->
    <div class="absolute top-0 -left-4 w-72 h-72 bg-purple-300 rounded-full mix-blend-multiply filter blur-2xl opacity-50 animate-blob"></div>
    <div class="absolute top-0 -right-4 w-72 h-72 bg-indigo-300 rounded-full mix-blend-multiply filter blur-2xl opacity-50 animate-blob animation-delay-2000"></div>
    <div class="absolute -bottom-8 left-20 w-72 h-72 bg-pink-300 rounded-full mix-blend-multiply filter blur-2xl opacity-50 animate-blob animation-delay-4000"></div>

    <!-- Main Container -->
    <div class="max-w-md w-full glass-panel rounded-3xl shadow-[0_8px_32px_rgb(0,0,0,0.08)] overflow-hidden p-8 relative z-10">
        
        <!-- Welcome & Mode Selection Screen -->
        <div id="welcome-screen" class="text-center">
            <div class="w-20 h-20 bg-gradient-to-tr from-indigo-500 to-purple-500 text-white rounded-2xl flex items-center justify-center mx-auto mb-6 transform -rotate-3 shadow-lg shadow-indigo-200">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </div>
            <h1 class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-indigo-700 to-purple-600 mb-3">FindYourVibe</h1>
            <p class="text-slate-600 mb-6 leading-relaxed font-light">ค้นหาตัวตนที่ใช่ ก่อนไปพูดคุยกับพี่แนะแนวส่วนตัว เลือกแบบทดสอบที่เหมาะกับคุณเลย!</p>
            
            <div class="space-y-4">
                <button onclick="startQuiz('mode1')" class="w-full bg-white border-2 border-indigo-100 hover:border-indigo-400 rounded-2xl p-4 text-left transition-all duration-300 group hover:shadow-md">
                    <h3 class="font-semibold text-indigo-700 text-lg mb-1 group-hover:text-indigo-800">📝 แบบที่ 1: พอมีภาพในหัว</h3>
                    <p class="text-sm text-slate-500">เน้นถามถึงความถนัด แนวคิดในการทำงาน และภาพอนาคต</p>
                </button>

                <button onclick="startQuiz('mode2')" class="w-full bg-white border-2 border-purple-100 hover:border-purple-400 rounded-2xl p-4 text-left transition-all duration-300 group hover:shadow-md">
                    <h3 class="font-semibold text-purple-700 text-lg mb-1 group-hover:text-purple-800">🎮 แบบที่ 2: ไม่รู้อะไรเลย</h3>
                    <p class="text-sm text-slate-500">เจาะพฤติกรรมไลฟ์สไตล์ สัญชาตญาณในชีวิตประจำวัน</p>
                </button>
            </div>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" class="hidden">
            <div class="mb-8 flex justify-between items-center text-sm font-medium text-slate-500">
                <span id="question-counter" class="bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full">ข้อ 1 / 4</span>
                <div class="w-32 h-2.5 bg-slate-200/50 rounded-full overflow-hidden">
                    <div id="progress-bar" class="h-full bg-gradient-to-r from-indigo-500 to-purple-500 w-1/4 transition-all duration-500 ease-out rounded-full"></div>
                </div>
            </div>
            <h2 id="question-text" class="text-xl font-semibold mb-6 text-slate-800 leading-snug">คำถาม</h2>
            <div id="options-container" class="space-y-3">
                <!-- Options injected here -->
            </div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="hidden text-center">
            <div class="w-28 h-28 bg-gradient-to-tr from-indigo-500 via-purple-500 to-pink-500 rounded-full flex items-center justify-center mx-auto mb-6 shadow-2xl shadow-purple-200 border-4 border-white">
                <span class="text-5xl">🎯</span>
            </div>
            <h2 class="text-xl font-medium text-slate-500 mb-2">Vibe ของคุณคือ...</h2>
            <p id="vibe-result" class="text-xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-indigo-700 to-purple-600 mb-8 py-2">สาย...</p>
            <p class="text-slate-600 mb-8 text-sm leading-relaxed">ข้อมูลของคุณพร้อมแล้ว! นำผลลัพธ์นี้ไปพูดคุยกับพี่แนะแนว AI เพื่อรับคำปรึกษาแบบเอ็กซ์คลูซีฟได้เลย</p>
            <button onclick="goToChat()" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-medium py-4 rounded-2xl shadow-xl shadow-indigo-200 transition-all duration-300 flex justify-center items-center gap-2 group active:scale-[0.98] text-lg">
                แชตกับพี่แนะแนว 
                <svg class="w-5 h-5 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
            </button>
        </div>
    </div>

    <script>
        const quizData = {
            mode1: [
                {
                    text: "ถ้าให้เลือกวิชาเลือกเสรีได้ 1 วิชา น้องอยากเรียนวิชาอะไรมากที่สุด?",
                    options: [
                        { text: "จิตวิทยาและการสื่อสาร (เรียนรู้การอ่านใจคนและศิลปะการพูด)", type: "สายสังคมและการสื่อสาร (Social & Communication)" },
                        { text: "การออกแบบและมัลติมีเดีย (เรียนวาดรูป กราฟิก หรือทำสื่อสร้างสรรค์)", type: "สายศิลปะและความคิดสร้างสรรค์ (Art & Design)" },
                        { text: "นวัตกรรมและเทคโนโลยี (เรียนการเขียนโปรแกรม หรือการต่อวงจรและฮาร์ดแวร์)", type: "สายเทคโนโลยีและปฏิบัติการ (Tech & Hands-on)" },
                        { text: "การจัดการและวิเคราะห์ข้อมูล (เรียนการวางแผนธุรกิจ หรือสถิติเพื่อคาดการณ์อนาคต)", type: "สายข้อมูลและการวิเคราะห์ (Data & Analysis)" }
                    ]
                },
                {
                    text: "เวลาทำโครงงานกลุ่ม หน้าที่ไหนที่น้องทำแล้วรู้สึกว่า 'นี่แหละ ถนัดสุด'?",
                    options: [
                        { text: "ฝ่ายพรีเซนต์และประสานงาน (เป็นตัวแทนพูดหน้าห้อง หรือเคลียร์ใจเพื่อนในกลุ่ม)", type: "สายสังคมและการสื่อสาร (Social & Communication)" },
                        { text: "ฝ่ายศิลป์และดีไซน์ (ออกแบบสไลด์ ตัดต่อคลิป คุมโทนงานให้สวยปัง)", type: "สายศิลปะและความคิดสร้างสรรค์ (Art & Design)" },
                        { text: "ฝ่ายเทคนิคและลงมือทำ (ประกอบชิ้นงานจริง เซ็ตอัประบบ หรือทดสอบโปรเจกต์)", type: "สายเทคโนโลยีและปฏิบัติการ (Tech & Hands-on)" },
                        { text: "ฝ่ายข้อมูลและวางแผน (หาข้อมูลอ้างอิง ตรวจสอบความถูกต้อง และจัดตารางงาน)", type: "สายข้อมูลและการวิเคราะห์ (Data & Analysis)" }
                    ]
                },
                {
                    text: "ภาพจำ 'สถานที่ทำงานในฝัน' ของน้องเป็นแบบไหน?",
                    options: [
                        { text: "ออฟฟิศที่เต็มไปด้วยผู้คน ได้พบปะลูกค้า หรือออกเดินทางไปที่ใหม่ๆ ตลอดเวลา", type: "สายสังคมและการสื่อสาร (Social & Communication)" },
                        { text: "สตูดิโอเก๋ๆ ไม่ฟิกซ์เวลาเข้างาน ขอแค่งานออกมาอาร์ตและตอบโจทย์", type: "สายศิลปะและความคิดสร้างสรรค์ (Art & Design)" },
                        { text: "เวิร์กชอปหรือห้องแล็บส่วนตัว ที่มีเครื่องมือและอุปกรณ์ให้หยิบจับทดลองได้เต็มที่", type: "สายเทคโนโลยีและปฏิบัติการ (Tech & Hands-on)" },
                        { text: "โต๊ะทำงานเงียบๆ มีจอคอมพิวเตอร์หลายจอ ให้มีสมาธิโฟกัสกับตัวเลขหรือตรรกะ", type: "สายข้อมูลและการวิเคราะห์ (Data & Analysis)" }
                    ]
                },
                {
                    text: "สำหรับน้อง 'ความสำเร็จในการทำงาน' คือการได้ทำสิ่งไหน?",
                    options: [
                        { text: "การได้ช่วยเหลือผู้คน หรือสร้างเครือข่ายคอนเนคชันที่แข็งแกร่ง", type: "สายสังคมและการสื่อสาร (Social & Communication)" },
                        { text: "การได้สร้างสรรค์ผลงานที่เป็นเอกลักษณ์และมีคนชื่นชมในความสวยงาม", type: "สายศิลปะและความคิดสร้างสรรค์ (Art & Design)" },
                        { text: "การได้สร้างระบบหรือประดิษฐ์สิ่งใหม่ๆ ที่ใช้งานได้จริงและแก้ปัญหาได้", type: "สายเทคโนโลยีและปฏิบัติการ (Tech & Hands-on)" },
                        { text: "การได้แก้โจทย์ที่ซับซ้อน หรือสามารถคาดการณ์ผลลัพธ์ได้อย่างแม่นยำ", type: "สายข้อมูลและการวิเคราะห์ (Data & Analysis)" }
                    ]
                }
            ],
            mode2: [
                {
                    text: "เวลาไถฟีดโซเชียล (TikTok, YouTube, IG) คอนเทนต์แนวไหนที่น้องดูเพลินจนลืมเวลา?",
                    options: [
                        { text: "คลิปเล่าเรื่องดราม่า, สัมภาษณ์คนดัง, หรือพอดแคสต์คุยเรื่องชีวิต", type: "สายสังคมและการสื่อสาร (Social & Communication)" },
                        { text: "คลิปสอนแต่งรูป, Vlog พาเที่ยวคาเฟ่ภาพสวยๆ, หรือเสพงานอาร์ต", type: "สายศิลปะและความคิดสร้างสรรค์ (Art & Design)" },
                        { text: "คลิปแกะกล่องรีวิวของล้ำๆ, ซ่อมคอม, หรือสอนทำของ DIY แปลกๆ", type: "สายเทคโนโลยีและปฏิบัติการ (Tech & Hands-on)" },
                        { text: "คลิปสรุปประวัติศาสตร์ 10 นาทีจบ, หรืออธิบายเจาะลึกว่าสิ่งนี้ทำงานยังไง", type: "สายข้อมูลและการวิเคราะห์ (Data & Analysis)" }
                    ]
                },
                {
                    text: "เวลาเล่นเกม (เช่น แนวสร้างเมือง แนวเอาชีวิตรอด หรือตีป้อม) สไตล์การเล่นของน้องคือแบบไหน?",
                    options: [
                        { text: "สายคุมโซนและเจรจา: ชอบสร้างพันธมิตร คอยสั่งการ หรือเล่นซัพพอร์ตเพื่อน", type: "สายสังคมและการสื่อสาร (Social & Communication)" },
                        { text: "สายแฟชั่นและตกแต่ง: เน้นสร้างเมืองให้สวยเป๊ะ สกินต้องปัง", type: "สายศิลปะและความคิดสร้างสรรค์ (Art & Design)" },
                        { text: "สายช่างและทดลอง: ชอบหาวิธีบั๊กของเกม ลองดัดแปลงไอเทม หรือเทสต์ระบบ", type: "สายเทคโนโลยีและปฏิบัติการ (Tech & Hands-on)" },
                        { text: "สายฟาร์มและวางแผน: ชอบบริหารทรัพยากร อัปเกรดฐานให้คุ้มค่าที่สุด", type: "สายข้อมูลและการวิเคราะห์ (Data & Analysis)" }
                    ]
                },
                {
                    text: "สมมติว่าซื้อชั้นวางของมาประกอบเอง แต่ต่อยังไงก็ไม่เข้า สิ่งแรกที่น้องจะทำคือ?",
                    options: [
                        { text: "ทักแชตหาเพื่อน ถ่ายรูปลงสตอรี่ หรือตั้งกระทู้ถามคนอื่นให้ช่วยดู", type: "สายสังคมและการสื่อสาร (Social & Communication)" },
                        { text: "พักก่อน! อารมณ์เสีย เดินไปหาขนมกิน อารมณ์ดีแล้วค่อยมาหาวิธีใหม่", type: "สายศิลปะและความคิดสร้างสรรค์ (Art & Design)" },
                        { text: "ช่างคู่มือ! ลองจับยัดๆ งัดแงะดู หรือหาเครื่องมืออื่นมาดัดแปลงให้เข้ากัน", type: "สายเทคโนโลยีและปฏิบัติการ (Tech & Hands-on)" },
                        { text: "รื้อใหม่หมด แล้วกางคู่มือมานั่งไล่อ่านใหม่ทีละบรรทัดอย่างละเอียด", type: "สายข้อมูลและการวิเคราะห์ (Data & Analysis)" }
                    ]
                },
                {
                    text: "ถ้าสามารถเลือก 'พลังวิเศษ' ได้ 1 อย่าง น้องอยากได้พลังอะไรมากที่สุด?",
                    options: [
                        { text: "พลังอ่านใจคนออก และพูดโน้มน้าวใครก็คล้อยตาม", type: "สายสังคมและการสื่อสาร (Social & Communication)" },
                        { text: "พลังเสกสิ่งที่คิดในหัว ให้ออกมาเป็นรูปร่างที่จับต้องได้จริง", type: "สายศิลปะและความคิดสร้างสรรค์ (Art & Design)" },
                        { text: "พลังควบคุมและเชื่อมต่อกับเครื่องจักรหรืออุปกรณ์อิเล็กทรอนิกส์ได้ทุกชนิด", type: "สายเทคโนโลยีและปฏิบัติการ (Tech & Hands-on)" },
                        { text: "พลังหยุดเวลาชั่วคราว เพื่อให้มีเวลาคิดวิเคราะห์สถานการณ์ได้อย่างรอบคอบ", type: "สายข้อมูลและการวิเคราะห์ (Data & Analysis)" }
                    ]
                }
            ]
        };

        let currentQuestions = [];
        let currentQuestionIndex = 0;
        let scores = {};

        function startQuiz(mode) {
            currentQuestions = quizData[mode];
            currentQuestionIndex = 0;
            scores = {
                "สายสังคมและการสื่อสาร (Social & Communication)": 0,
                "สายศิลปะและความคิดสร้างสรรค์ (Art & Design)": 0,
                "สายเทคโนโลยีและปฏิบัติการ (Tech & Hands-on)": 0,
                "สายข้อมูลและการวิเคราะห์ (Data & Analysis)": 0
            };
            
            document.getElementById('welcome-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            const q = currentQuestions[currentQuestionIndex];
            document.getElementById('question-text').textContent = q.text;
            document.getElementById('question-counter').textContent = `ข้อ ${currentQuestionIndex + 1} / ${currentQuestions.length}`;
            document.getElementById('progress-bar').style.width = `${((currentQuestionIndex + 1) / currentQuestions.length) * 100}%`;
            
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            
            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-4 rounded-2xl bg-white/60 border border-white hover:border-indigo-300 hover:bg-white text-slate-700 hover:text-indigo-700 transition-all duration-300 shadow-sm hover:shadow-md focus:outline-none focus:ring-4 focus:ring-indigo-100 animate-fade-in text-[14px] md:text-[15px]";
                btn.style.animationDelay = `${index * 100}ms`;
                btn.innerHTML = `<span class="block">${opt.text}</span>`;
                btn.onclick = () => selectOption(opt.type);
                optionsContainer.appendChild(btn);
            });
        }

        function selectOption(type) {
            scores[type]++;
            currentQuestionIndex++;
            
            if (currentQuestionIndex < currentQuestions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            
            let maxScore = -1;
            let finalVibe = "";
            for (const [vibe, score] of Object.entries(scores)) {
                if (score > maxScore) {
                    maxScore = score;
                    finalVibe = vibe;
                }
            }
            
            document.getElementById('vibe-result').textContent = finalVibe;
            sessionStorage.setItem('user_vibe', finalVibe);
        }

        function goToChat() {
            window.location.href = 'chat.html';
        }
    </script>
